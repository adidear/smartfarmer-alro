<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
  body{font-family:'Sarabun',sans-serif;font-size:13px;padding:12px;margin:0;color:#222}
  h3{color:#085041;margin:0 0 12px;font-size:15px}
  .sec{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;
       letter-spacing:.05em;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid #eee}
  label{display:block;font-size:12px;color:#555;margin-bottom:3px}
  input,select,textarea{width:100%;box-sizing:border-box;padding:7px 9px;
    border:1px solid #ddd;border-radius:4px;font-size:13px;font-family:'Sarabun',sans-serif}
  textarea{height:60px;resize:vertical}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
  .f1{margin-bottom:8px}
  .req{color:#c0392b}
  .btn{width:100%;padding:10px;background:#085041;color:#fff;border:none;
       border-radius:4px;font-size:14px;font-family:'Sarabun',sans-serif;cursor:pointer;margin-top:10px}
  .btn:hover{background:#04342C}
  .msg{padding:9px 12px;border-radius:4px;margin-top:10px;font-size:13px;border-left:3px solid}
  .ok{background:#E1F5EE;border-color:#0F6E56;color:#085041}
  .err{background:#FCEBEB;border-color:#c0392b;color:#7b0000}
  .warn{background:#FAEEDA;border-color:#854F0B;color:#412402}
  .found-box{background:#E1F5EE;border:1px solid #9FE1CB;border-radius:4px;
             padding:8px 10px;margin-top:6px;font-size:12px;color:#085041}
  .checks{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}
  .checks label{display:flex;align-items:center;gap:5px;font-size:12px;
                color:#333;font-weight:400;margin:0;width:auto}
  input[type=checkbox]{width:auto}
  input[readonly]{background:#f5f5f5;color:#888}
  .diff{font-size:12px;margin-top:4px;color:#0F6E56}
</style>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<script>
function v(id){ return document.getElementById(id).value.trim(); }
function chk(id){ return document.getElementById(id).checked ? 'นำไปใช้' : ''; }
function chkC(id){ return document.getElementById(id).checked ? 'มี' : ''; }

function lookup(){
  const id = v('id');
  const el = document.getElementById('lookup-result');
  const nm = document.getElementById('fname-display');
  if(id.length !== 13){ el.innerHTML=''; nm.value=''; return; }
  google.script.run
    .withSuccessHandler(r=>{
      if(r.found){
        nm.value = r.title + r.fname + ' ' + r.lname;
        el.innerHTML = '<div class="found-box">✓ พบในระบบ: '
          + r.title+r.fname+' '+r.lname
          + ' | '+r.province+' | สถานะ: '+r.status+'</div>';
      } else {
        nm.value = '';
        el.innerHTML = '<div class="msg err">⚠ ไม่พบเลขบัตรในระบบ — กรุณาลงทะเบียนเกษตรกรก่อน</div>';
      }
    })
    .lookupName(id);
}

function calcDiff(){
  const i1 = Number(v('inc1'))||0;
  const i2 = Number(v('inc2'))||0;
  const el = document.getElementById('diff');
  if(i1 && i2){
    const d = i2 - i1;
    const pct = (d/i1*100).toFixed(1);
    el.innerHTML = (d>=0?'↑ เพิ่มขึ้น ':'↓ ลดลง ')
      + Math.abs(d).toLocaleString() + ' บาท (' + pct + '%)';
    el.style.color = d>=0 ? '#0F6E56' : '#c0392b';
  } else { el.innerHTML=''; }
}

function submit(){
  // ตรวจสอบบังคับกรอก
  if(v('id').length!==13){ show('err','กรุณากรอกเลขบัตรประชาชน 13 หลัก'); return; }
  if(!v('year')){ show('err','กรุณาเลือกปีงบประมาณ'); return; }
  if(!v('arai')){ show('err','กรุณากรอกพื้นที่ทั้งหมด (ไร่)'); return; }
  if(v('angan')==='')  { show('err','กรุณากรอกจำนวนงาน'); return; }
  if(v('awa')==='')    { show('err','กรุณากรอกจำนวนตารางวา'); return; }
  if(!v('plotNo'))     { show('err','กรุณากรอกแปลงเลขที่'); return; }
  if(!v('rawang'))     { show('err','กรุณากรอกกลุ่ม/ระวาง ส.ป.ก.'); return; }
  if(!v('plotMoo')||!v('plotSub')||!v('plotDis')||!v('plotProv'))
    { show('err','กรุณากรอกที่ตั้งแปลงให้ครบ (หมู่/ตำบล/อำเภอ/จังหวัด)'); return; }
  if(!v('water')||!v('power')||!v('signal')||!v('road')||!v('transport'))
    { show('err','กรุณาเลือกข้อมูลสาธารณูปโภคและการคมนาคมให้ครบ'); return; }
  if(!v('areaRai')||!v('yieldAmt')||!v('yieldUnit'))
    { show('err','กรุณากรอกพื้นที่ ปริมาณผลผลิต และหน่วยนับ'); return; }
  if(!v('inc1')||!v('inc2'))
    { show('err','กรุณากรอกรายได้ก่อนและหลังเข้าร่วม'); return; }
  if(!anyChk('ch1','ch2','ch3','ch4'))
    { show('err','กรุณาเลือกช่องทางการขายอย่างน้อย 1 ช่องทาง'); return; }
  if(!anyChk('k1','k2','k3','k4','k5') && !v('kNot'))
    { show('err','กรุณาเลือกการนำความรู้ไปใช้ หรือระบุเหตุผลที่ไม่ได้นำไปใช้'); return; }
  if(!anyChk('c1','c2','c3','c4','c5','c6','c7') && !v('cOther'))
    { show('err','กรุณาเลือกความเปลี่ยนแปลงที่เกิดขึ้นอย่างน้อย 1 ข้อ'); return; }
  if(!v('result'))   { show('err','กรุณาเลือกผลการประเมิน SF'); return; }
  if(!v('sfType'))   { show('err','กรุณาเลือกประเภทเกษตรกร'); return; }
  if(!v('staff'))    { show('err','กรุณากรอกชื่อผู้จัดเก็บข้อมูล'); return; }
  if(!v('staffTel')) { show('err','กรุณากรอกเบอร์ติดต่อผู้จัดเก็บ'); return; }
  if(!v('recordDate')){ show('err','กรุณากรอกวันที่ลงข้อมูล'); return; }

  // คำนวณ incSummary อัตโนมัติจากยอดที่กรอก
  const i1 = Number(v('inc1'))||0, i2 = Number(v('inc2'))||0;
  const incSummary = i2 > i1 ? 'เพิ่มขึ้น' : i2 < i1 ? 'ลดลง' : 'เท่าเดิม';

  const form = {
    id:v('id'), year:v('year'),
    arai:v('arai'), angan:v('angan'), awa:v('awa'),
    jRai:v('arai'), jNgan:v('angan'), jWa:v('awa'),
    plotNo:v('plotNo'), rawang:v('rawang'),
    plotMoo:v('plotMoo'), plotSub:v('plotSub'),
    plotDis:v('plotDis'), plotProv:v('plotProv'),
    water:v('water'), power:v('power'),
    signal:v('signal'), road:v('road'), transport:v('transport'),
    act1:v('act1'), act2:v('act2'), act3:v('act3'), act4:v('act4'),
    act5:v('act5'), act6:v('act6'), act7:v('act7'), act8:v('act8'),
    areaRai:v('areaRai'), yieldAmt:v('yieldAmt'), yieldUnit:v('yieldUnit'),
    ch1:document.getElementById('ch1').checked?'มี':'',
    ch2:document.getElementById('ch2').checked?'มี':'',
    ch3:document.getElementById('ch3').checked?'มี':'',
    ch4:document.getElementById('ch4').checked?'มี':'',
    page:v('page'),
    inc1:v('inc1'), inc2:v('inc2'), incSummary,
    k1:chk('k1'), k2:chk('k2'), k3:chk('k3'), k4:chk('k4'), k5:chk('k5'),
    kNot:v('kNot'),
    c1:chkC('c1'), c2:chkC('c2'), c3:chkC('c3'),
    c4:chkC('c4'), c5:chkC('c5'), c6:chkC('c6'),
    c7:chkC('c7'), cOther:v('cOther'),
    problem:document.getElementById('problem').value.trim(),
    result:v('result'), sfType:v('sfType'),
    staff:v('staff'), staffTel:v('staffTel'), recordDate:v('recordDate')
  };

  show('warn','⏳ กำลังบันทึก...');
  google.script.run
    .withSuccessHandler(r=>{
      show(r.ok?'ok':'err', r.msg);
      if(r.ok) google.script.run.savePlot(form);
    })
    .saveHistory(form);
}

function show(type,msg){
  document.getElementById('result-msg').innerHTML =
    '<div class="msg '+type+'">'+msg+'</div>';
}

function anyChk(...ids){ 
  return ids.some(id => document.getElementById(id).checked); 
}
</script>
</body>
</html>
